<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../CSS/base/perfil.css"> <title>Alterar Informação</title>
    <link rel="stylesheet" href="../../CSS/base/alterar_perfil.css">

</head>
<body>
    <div class="container-alterar">
        <div class="card-edicao">
            <h2 id="titulo-pagina">Alterar Informações</h2>
            <p>Atualize seus dados abaixo:</p>
            
            <div class="grupo-input">
                <label for="input-email" class="label-estilizada">E-mail</label>
                <input type="email" id="input-email" placeholder="Digite o novo e-mail">
                <p id="erro-email" class="msg-erro-validacao"></p>
            </div>

            <div class="grupo-input">
                <label for="input-senha" class="label-estilizada">Nova Senha</label>
                <input type="password" id="input-senha" placeholder="Digite a nova senha">
                <p id="erro-senha" class="msg-erro-validacao"></p>
            </div>

            <div class="botoes">
                <a href="perfil.html" class="btn-acao voltar">Cancelar</a>
                <button id="btn-salvar" class="btn-acao salvar">Salvar Alteração</button>
            </div>
        </div>
    </div>

    <script src="../../JS/alterar_perfil.js"></script>
</body>
</html>

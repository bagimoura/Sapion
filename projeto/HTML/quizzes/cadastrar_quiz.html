<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../CSS/quizzes/cadastrar_quiz.css">
    <link rel="shortcut icon" href="../../IMGS/favicon.svg" type="image/png">
    <title>Cadastrar Quiz</title>
</head>
<body>
    <header>
        <div class="navbar">

            <img src="../../IMGS/logo.png" class="logo">

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul>
                <li><a href="../base/home.html" class="lista">Página Inicial</a></li>
                <li><a href="../base/categorias.html" class="lista">Categorias</a></li>
                <li><a href="../base/sobre.html" class="lista">Sobre o Portal</a></li>
                <li class="hide" id="menu-perfil"><a href="../base/perfil.html" class="lista">Perfil</a></li>
            </ul>

            <div class="search-container">
                <input type="text" id="barra-pesquisa" placeholder="pesquisar" class="search-bar">
                <div id="lista-menu" class="sugestoes-box"></div>
            </div>

            <button type="submit" class="menu-svg" id="pesquisar-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>

            <div id="menu-login" class="show">
                <a href="../base/login.html">
                    <button class="menu-svg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Entrar</span>
                    </button>
                </a>
            </div>

            <div id="menu-add" class="hide">
                <a href="cadastrar_quiz.html"> 
                    <button class="menu-svg btn-orange">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Novo</span>
                    </button>
                </a>
            </div>

        </div>
    </header>

    <main>
        <form id="cadastrar-quiz" class="cadastrar-quiz">
            <h1>Criar Quiz</h1>

            <fieldset>
                <legend>Informações Gerais</legend>

                <label for="titulo_quiz">Nome do Quiz:</label>
                <input type="text" id="titulo_quiz" placeholder="Ex: Matemática Básica">

                <label for="materia">Disciplina:</label>
                <select id="materia">
                    <option value="matematica">Matemática</option>
                    <option value="portugues">Português</option>
                    <option value="historia">História</option>
                    <option value="fisica">Física</option>
                    <option value="quimica">Química</option>
                    <option value="ingles">Inglês</option>
                    <option value="sociologia">Sociologia</option>
                    <option value="biologia">Biologia</option>
                </select>

                <label for="dificuldade">Dificuldade:</label>
                <select id="dificuldade">
                    <option value="facil">Fácil</option>
                    <option value="medio">Médio</option>
                    <option value="dificil">Difícil</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Nova Pergunta</legend>

                <label for="enunciado_pergunta">Enunciado da Pergunta:</label>
                <input type="text" id="enunciado_pergunta" placeholder="Digite a pergunta">

                <label for="foto_pergunta">Imagem da pergunta (opcional):</label>
                <input type="file" id="foto_pergunta" accept="image/*">

                <label>Alternativas (Mínimo 2, Máximo 5):</label>
                <div id="alternativas"></div>

                <div class="container-btn-alt">
                    <button type="button" id="btn-add-alt" onclick="adicionarAlternativa()">Adicionar alternativa</button>
                </div>

                <div class="container-btn-questao">
                    <button type="button" onclick="adicionarQuestao()">Adicionar Pergunta ao Quiz</button>
                </div>
            </fieldset>

            <div id="lista-quizzes"></div>

            <div class="botoes-finais">
                <button type="submit" class="btn-salvar">Salvar Quiz</button>
                <button type="button" onclick="descartarQuiz()" class="btn-descartar">Descartar Quiz</button>
            </div>
        </form>

        <template id="modelo-alternativa">
            <div class="alt-item">
                <input type="radio" name="correta" class="alt-radio">
                <input type="text" class="alt-texto">
                <button type="button" class="btn-remover-alt" title="remover">×</button>
            </div>
        </template>
    </main>

    <hr>

    <footer>
        <p>&copy; ARQIHCO - 2026. Todos os direitos reservados.</p>
    </footer>

    <script src="../../JS/quizzes/cadastro_quiz.js"></script>
    <script src="../../JS/base/main.js"></script>
    <script src="../../JS/base/pesquisar.js"></script>
</body>
</html>
